<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Profile photo placeholder for Haoyu Ren</title>
  <desc id="desc">A polished circular initials avatar that can be replaced by a headshot.</desc>
  <defs>
    <radialGradient id="g1" cx="25%" cy="18%" r="88%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="38%" stop-color="#38bdf8"/>
      <stop offset="76%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".7"/>
      <stop offset="46%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#111827" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="900" height="900" rx="96" fill="url(#g1)"/>
  <circle cx="210" cy="170" r="215" fill="url(#shine)" opacity=".7"/>
  <circle cx="735" cy="760" r="240" fill="#0f172a" opacity=".24"/>
  <path d="M118 690 C260 548 354 548 450 688 C550 538 664 536 795 690" fill="none" stroke="#fff" stroke-opacity=".30" stroke-width="42" stroke-linecap="round"/>
  <g filter="url(#shadow)">
    <circle cx="450" cy="410" r="132" fill="#ffffff" fill-opacity=".22"/>
    <circle cx="450" cy="410" r="102" fill="#ffffff" fill-opacity=".32"/>
    <path d="M240 700c38-116 120-180 210-180s172 64 210 180" fill="#ffffff" fill-opacity=".24"/>
  </g>
  <text x="450" y="610" text-anchor="middle" font-size="132" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="800" fill="#ffffff" letter-spacing="8">HR</text>
  <text x="450" y="680" text-anchor="middle" font-size="34" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="600" fill="#ffffff" opacity=".82">Add profile.jpg</text>
</svg>
